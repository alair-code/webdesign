<!-- HTML5 -->
<!DOCTYPE html>

<!-- Início da página -->
<html lang="pt-br">

  <!-- Configurações -->
  <head>

    <!-- Título da aba -->
    <title>Meu primeiro site</title>

    <!-- Página responsiva -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Define a codificação de caracteres do HTML.-->
    <meta charset="UTF-8">	

    <!--Chamando o arquivo CSS-->
    <link rel="stylesheet" href="styles.css"

  </head>

  <!-- Conteúdo visível -->
  <body>

    <!-- Cabeçalho -->
    <header>
      <p>Cabeçalho do site</p>
    </header>

    <!-- Menu -->
    <nav>

    <!--Listas não ordenada + Links do menu-->
      <ul>
        <li><a href="#Sobre">Sobre</a></li>
        <li><a href="#Serviços"> Serviços</a></li>
        <li><a href="#Contato">Contado</a></li>
      </ul>

    </nav>

    <!--A tag <main> significa conteúdo principal da página-->
    <main>

    <!-- Conteúdo principal -->
    <section>
      <section id="serviços">
        <h2>Sobre</h2>
        <p>Oferecemos solução modernas para web design</p>
    </section>
    </section>
  </main>

  <!--Colocando uma imagem-->
  <img	src=“imagem-exemplo.jpg“	alt=”Descrição	da imagem”>

    <!-- Rodapé -->
    <footer>
      <p>©	2025	Meu	Primeiro	Site.	Todos	os	direitos reservados.</p>

    </footer>

  </body>

</html>
